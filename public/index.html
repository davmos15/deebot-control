<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<title>Deebot Control</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --accent: #38bdf8;
    --accent-glow: rgba(56, 189, 248, 0.25);
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Login ── */
  #login-screen, #app-screen { display: none; }
  #login-screen.active, #app-screen.active { display: flex; }

  #login-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 24px;
  }
  .login-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
  }
  .login-card h1 {
    font-size: 24px;
    margin-bottom: 4px;
    text-align: center;
  }
  .login-card .subtitle {
    color: var(--text2);
    text-align: center;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--surface2);
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    outline: none;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }
  #login-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: var(--bg);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  #login-btn:disabled { opacity: 0.5; cursor: wait; }
  #login-error {
    color: var(--red);
    text-align: center;
    font-size: 14px;
    margin-top: 12px;
    min-height: 20px;
  }

  /* ── App ── */
  #app-screen {
    flex-direction: column;
    min-height: 100dvh;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--surface2);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .device-name { font-weight: 600; font-size: 18px; }
  .topbar .logout-btn {
    background: none;
    border: 1px solid var(--surface2);
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }

  .dashboard { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }

  /* Status card */
  .status-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
  }
  .status-badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-badge.idle { background: var(--surface2); color: var(--text2); }
  .status-badge.cleaning, .status-badge.auto { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .status-badge.charging { background: rgba(251, 146, 60, 0.15); color: var(--orange); }
  .status-badge.paused { background: rgba(56, 189, 248, 0.15); color: var(--accent); }
  .status-badge.returning, .status-badge.docking { background: rgba(251, 146, 60, 0.15); color: var(--orange); }
  .status-badge.error { background: rgba(248, 113, 113, 0.15); color: var(--red); }
  .status-badge.connecting { background: rgba(56, 189, 248, 0.15); color: var(--accent); }

  .battery-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
    font-size: 28px;
    font-weight: 700;
  }
  .battery-bar {
    width: 100%;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    margin-top: 10px;
    overflow: hidden;
  }
  .battery-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease, background 0.5s ease;
  }

  /* Map */
  .map-section { margin-bottom: 24px; }
  .map-container {
    position: relative;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .map-container img {
    width: 100%;
    height: auto;
    display: block;
    min-height: 200px;
    object-fit: contain;
    background: #111827;
  }
  .map-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px 14px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
  }
  .map-room-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  /* Buttons grid */
  .section-label {
    font-size: 13px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .btn-grid.three { grid-template-columns: repeat(3, 1fr); }
  .cmd-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 18px 10px;
    border: none;
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .cmd-btn:active { transform: scale(0.95); background: var(--surface2); }
  .cmd-btn .icon { font-size: 28px; }
  .cmd-btn.primary { background: var(--green); color: var(--bg); }
  .cmd-btn.primary:active { background: #22c55e; }
  .cmd-btn.danger { background: var(--red); color: var(--bg); }
  .cmd-btn.danger:active { background: #ef4444; }
  .cmd-btn.warn { background: var(--orange); color: var(--bg); }
  .cmd-btn.warn:active { background: #f97316; }

  /* Manual control toggle */
  .control-toggle {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }
  .toggle-btn {
    background: none;
    border: 1px solid var(--surface2);
    color: var(--text2);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }

  /* D-Pad */
  .dpad {
    display: grid;
    grid-template-areas:
      ". up ."
      "left stop right"
      ". down .";
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
    max-width: 240px;
    margin-left: auto;
    margin-right: auto;
  }
  .dpad button {
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .dpad button:active { transform: scale(0.9); background: var(--surface2); }
  .dpad .up { grid-area: up; }
  .dpad .down { grid-area: down; }
  .dpad .left { grid-area: left; }
  .dpad .right { grid-area: right; }
  .dpad .stop { grid-area: stop; background: var(--red); color: var(--bg); }

  /* Joystick */
  .joystick-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }
  .joystick-area {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--surface2) 0%, var(--surface) 70%);
    position: relative;
    touch-action: none;
    border: 3px solid var(--accent);
    box-shadow: 0 0 20px var(--accent-glow), inset 0 0 30px rgba(0,0,0,0.3);
  }
  .joystick-knob {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #5eead4, var(--accent));
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: none;
    box-shadow: 0 0 20px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.2);
  }
  .joystick-label {
    position: absolute;
    font-size: 11px;
    color: var(--text2);
    pointer-events: none;
  }
  .joystick-label.top { top: 8px; left: 50%; transform: translateX(-50%); }
  .joystick-label.bottom { bottom: 8px; left: 50%; transform: translateX(-50%); }
  .joystick-label.left { left: 8px; top: 50%; transform: translateY(-50%); }
  .joystick-label.right { right: 8px; top: 50%; transform: translateY(-50%); }

  /* Suction selector */
  .suction-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .suction-btn {
    flex: 1;
    padding: 12px 6px;
    border: 2px solid var(--surface2);
    border-radius: 10px;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .suction-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
  }

  /* Location */
  .location-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .location-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
  }
  .location-row + .location-row { border-top: 1px solid var(--surface2); }
  .location-label { font-size: 14px; color: var(--text2); }
  .location-val { font-size: 14px; font-weight: 600; }

  /* Consumables */
  .consumables {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
  }
  .consumable-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
  }
  .consumable-row + .consumable-row { border-top: 1px solid var(--surface2); }
  .consumable-name { font-size: 14px; }
  .consumable-val { font-size: 14px; font-weight: 600; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--surface2);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Fullscreen map */
  .map-fullscreen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #000;
    flex-direction: column;
  }
  .map-fullscreen.active { display: flex; }
  .map-fs-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: rgba(15, 23, 42, 0.9);
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 2;
  }
  .map-fs-header .room-name { font-size: 14px; font-weight: 600; }
  .map-fs-close {
    background: var(--surface2);
    border: none;
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
  }
  .map-fs-img {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }
  .map-fs-img img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .map-fs-joystick {
    position: absolute;
    bottom: 30px;
    right: 20px;
    z-index: 3;
  }
  .map-fs-joystick .joystick-area {
    width: 140px;
    height: 140px;
    opacity: 0.85;
  }
  .map-fs-joystick .joystick-knob {
    width: 50px;
    height: 50px;
  }
  .map-fs-joystick .joystick-label { font-size: 9px; }
  .map-tap-hint {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.5);
    color: var(--text2);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen" class="active">
  <div class="login-card">
    <h1>Deebot Control</h1>
    <p class="subtitle">Sign in with your Ecovacs account</p>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="Your Ecovacs password">
    </div>
    <div class="row">
      <div class="field">
        <label for="country">Country</label>
        <select id="country">
          <option value="us">US</option>
          <option value="au">Australia</option>
          <option value="gb">UK</option>
          <option value="de">Germany</option>
          <option value="fr">France</option>
          <option value="it">Italy</option>
          <option value="es">Spain</option>
          <option value="ca">Canada</option>
          <option value="jp">Japan</option>
          <option value="cn">China</option>
          <option value="kr">South Korea</option>
          <option value="sg">Singapore</option>
          <option value="my">Malaysia</option>
          <option value="in">India</option>
          <option value="br">Brazil</option>
          <option value="nl">Netherlands</option>
          <option value="at">Austria</option>
          <option value="ch">Switzerland</option>
          <option value="se">Sweden</option>
          <option value="no">Norway</option>
          <option value="dk">Denmark</option>
          <option value="fi">Finland</option>
          <option value="pl">Poland</option>
          <option value="pt">Portugal</option>
          <option value="tw">Taiwan</option>
          <option value="hk">Hong Kong</option>
          <option value="nz">New Zealand</option>
        </select>
      </div>
      <div class="field">
        <label for="continent">Continent</label>
        <select id="continent">
          <option value="ww">World (ww)</option>
          <option value="eu">Europe (eu)</option>
          <option value="na">North America (na)</option>
          <option value="as">Asia (as)</option>
        </select>
      </div>
    </div>
    <button id="login-btn" onclick="doLogin()">Connect to Robot</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app-screen">
  <div class="topbar">
    <span class="device-name" id="device-name">Deebot</span>
    <div style="display:flex;gap:8px;">
      <a href="/audio.html" class="logout-btn" style="text-decoration:none;">Audio Lab</a>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="dashboard">

    <!-- Status -->
    <div class="status-card">
      <span class="status-badge idle" id="status-badge">IDLE</span>
      <div class="battery-row">
        <span id="battery-icon">&#128267;</span>
        <span id="battery-pct">--%</span>
      </div>
      <div class="battery-bar">
        <div class="battery-fill" id="battery-fill" style="width:0%;background:var(--green)"></div>
      </div>
    </div>

    <!-- Map -->
    <div class="map-section" id="map-section" style="display:none;">
      <div class="section-label">Live Map</div>
      <div class="map-container" onclick="openMapFullscreen()" style="cursor:pointer;">
        <img id="map-img" alt="Vacuum map">
        <div class="map-overlay">
          <span id="map-room" class="map-room-label"></span>
        </div>
        <div class="map-tap-hint">Tap for fullscreen</div>
      </div>
    </div>

    <!-- Main controls -->
    <div class="section-label">Controls</div>
    <div class="btn-grid">
      <button class="cmd-btn primary" onclick="cmd('clean')">
        <span class="icon">&#9654;</span> Clean
      </button>
      <button class="cmd-btn danger" onclick="cmd('stop')">
        <span class="icon">&#9724;</span> Stop
      </button>
      <button class="cmd-btn" onclick="cmd('pause')" style="background:var(--accent);color:var(--bg);">
        <span class="icon">&#10074;&#10074;</span> Pause
      </button>
      <button class="cmd-btn warn" onclick="cmd('charge')">
        <span class="icon">&#9889;</span> Charge
      </button>
      <button class="cmd-btn" onclick="cmd('playSound')">
        <span class="icon">&#128266;</span> Find
      </button>
      <button class="cmd-btn" onclick="cmd('relocate')">
        <span class="icon">&#128205;</span> Relocate
      </button>
    </div>

    <!-- Suction -->
    <div class="section-label">Suction Power</div>
    <div class="suction-row">
      <button class="suction-btn" onclick="setSuction('quiet',this)">Quiet</button>
      <button class="suction-btn active" onclick="setSuction('standard',this)">Standard</button>
      <button class="suction-btn" onclick="setSuction('max',this)">Max</button>
      <button class="suction-btn" onclick="setSuction('max+',this)">Max+</button>
    </div>

    <!-- Manual Control -->
    <div class="section-label">Manual Control</div>
    <div class="control-toggle">
      <button class="toggle-btn" id="ctrl-toggle" onclick="toggleControlMode()">Switch to Buttons</button>
    </div>
    <div id="joystick-container">
      <div class="joystick-wrap">
        <div class="joystick-area" id="joystick">
          <span class="joystick-label top">FWD</span>
          <span class="joystick-label bottom">BACK</span>
          <span class="joystick-label left">LEFT</span>
          <span class="joystick-label right">RIGHT</span>
          <div class="joystick-knob" id="joystick-knob"></div>
        </div>
      </div>
    </div>
    <div id="dpad-container" style="display:none;">
      <div class="dpad">
        <button class="up" onclick="move('forward')">&#9650;</button>
        <button class="left" onclick="move('left')">&#9664;</button>
        <button class="stop" onclick="cmd('stop')">&#9724;</button>
        <button class="right" onclick="move('right')">&#9654;</button>
        <button class="down" onclick="move('backward')">&#9660;</button>
      </div>
    </div>

    <!-- Location -->
    <div class="section-label">Location</div>
    <div class="location-card">
      <div class="location-row">
        <span class="location-label">Map</span>
        <span class="location-val" id="loc-map">--</span>
      </div>
      <div class="location-row">
        <span class="location-label">Room</span>
        <span class="location-val" id="loc-room">--</span>
      </div>
      <div class="location-row">
        <span class="location-label">Position</span>
        <span class="location-val" id="loc-pos">--</span>
      </div>
      <div class="location-row">
        <span class="location-label">Dock</span>
        <span class="location-val" id="loc-dock">--</span>
      </div>
    </div>

    <!-- Consumables -->
    <div class="section-label">Consumables</div>
    <div class="consumables" id="consumables">
      <div class="consumable-row">
        <span class="consumable-name">Main Brush</span>
        <span class="consumable-val" id="c-main">--</span>
      </div>
      <div class="consumable-row">
        <span class="consumable-name">Side Brush</span>
        <span class="consumable-val" id="c-side">--</span>
      </div>
      <div class="consumable-row">
        <span class="consumable-name">Filter</span>
        <span class="consumable-val" id="c-filter">--</span>
      </div>
    </div>

  </div>
</div>

<!-- Fullscreen Map -->
<div class="map-fullscreen" id="map-fullscreen">
  <div class="map-fs-header">
    <span class="room-name" id="fs-room"></span>
    <button class="map-fs-close" onclick="closeMapFullscreen()">&#10005;</button>
  </div>
  <div class="map-fs-img">
    <img id="fs-map-img" alt="Map">
  </div>
  <div class="map-fs-joystick">
    <div class="joystick-area" id="fs-joystick">
      <span class="joystick-label top">FWD</span>
      <span class="joystick-label bottom">BACK</span>
      <span class="joystick-label left">L</span>
      <span class="joystick-label right">R</span>
      <div class="joystick-knob" id="fs-joystick-knob"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = location.origin;
let token = localStorage.getItem("deebot_token");

// ── Init ──
if (token) {
  // Validate token before showing app (avoids flash if session expired)
  fetch(API + "/api/state", { headers: { "Authorization": "Bearer " + token } })
    .then(r => {
      if (r.ok) { showApp(); pollState(); }
      else { token = null; localStorage.removeItem("deebot_token"); }
    })
    .catch(() => { token = null; localStorage.removeItem("deebot_token"); });
}

// ── Login ──
async function doLogin() {
  const btn = document.getElementById("login-btn");
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";
  btn.disabled = true;
  btn.textContent = "Connecting...";

  try {
    const res = await fetch(API + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        country: document.getElementById("country").value,
        continent: document.getElementById("continent").value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Login failed");

    token = data.token;
    localStorage.setItem("deebot_token", token);
    document.getElementById("device-name").textContent = data.device || "Deebot";
    showApp();
    pollState();
    toast("Connected!");
  } catch (err) {
    errEl.textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "Connect to Robot";
  }
}

function showApp() {
  document.getElementById("login-screen").classList.remove("active");
  document.getElementById("app-screen").classList.add("active");
}

// ── Logout ──
async function doLogout() {
  try { await fetch(API + "/api/logout", { method: "POST", headers: authHeaders() }); } catch {}
  token = null;
  localStorage.removeItem("deebot_token");
  document.getElementById("app-screen").classList.remove("active");
  document.getElementById("login-screen").classList.add("active");
}

// ── Auth helper ──
function authHeaders() {
  return { "Authorization": "Bearer " + token, "Content-Type": "application/json" };
}

// ── Commands ──
async function cmd(action, body = {}) {
  try {
    const res = await fetch(API + "/api/" + action, {
      method: "POST", headers: authHeaders(), body: JSON.stringify(body),
    });
    if (res.status === 401) return doLogout();
    const data = await res.json();
    if (data.success) toast(capitalize(action) + " sent");
    else toast(data.error || "Failed", true);
  } catch { toast("Connection error", true); }
}

async function move(dir) {
  await cmd("move", { direction: dir });
}

async function setSuction(level, el) {
  document.querySelectorAll(".suction-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  try {
    const res = await fetch(API + "/api/setSuction", {
      method: "POST", headers: authHeaders(), body: JSON.stringify({ level }),
    });
    if (res.status === 401) return doLogout();
    toast("Suction: " + level);
  } catch { toast("Connection error", true); }
}

// ── Polling ──
let pollTimer;
async function pollState() {
  clearInterval(pollTimer);
  pollTimer = setInterval(fetchState, 3000);
  fetchState();
}

async function fetchState() {
  if (!token) return;
  try {
    const res = await fetch(API + "/api/state", { headers: authHeaders() });
    if (res.status === 401) return doLogout();
    const s = await res.json();
    updateUI(s);
  } catch {}
}

// ── Map ──
let mapVisible = false;
let mapThrottle = false;
async function fetchMap() {
  if (!token) return;
  try {
    const res = await fetch(API + "/api/map", { headers: authHeaders() });
    if (res.status === 401) return doLogout();
    if (!res.ok) return; // map not ready yet
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const img = document.getElementById("map-img");
    const oldUrl = img.src;
    img.src = url;
    if (oldUrl && oldUrl.startsWith("blob:")) URL.revokeObjectURL(oldUrl);
    if (!mapVisible) {
      document.getElementById("map-section").style.display = "";
      mapVisible = true;
    }
  } catch {}
}

function updateUI(s) {
  // Status
  const badge = document.getElementById("status-badge");
  const statusText = s.status || "idle";
  badge.textContent = statusText.toUpperCase();
  badge.className = "status-badge " + statusText.toLowerCase().replace(/\s+/g, "");

  // Battery
  const pct = s.battery != null ? s.battery : null;
  document.getElementById("battery-pct").textContent = pct != null ? pct + "%" : "--%";
  const fill = document.getElementById("battery-fill");
  if (pct != null) {
    fill.style.width = pct + "%";
    fill.style.background = pct > 40 ? "var(--green)" : pct > 15 ? "var(--orange)" : "var(--red)";
  }

  // Map overlay
  if (s.hasMap && !mapThrottle) {
    mapThrottle = true;
    fetchMap();
    setTimeout(() => { mapThrottle = false; }, 10000);
  }
  const roomName = s.currentSpotArea || "";
  document.getElementById("map-room").textContent = roomName
    ? "Currently in: " + roomName
    : "";

  // Location
  document.getElementById("loc-map").textContent = s.currentMapName || "--";
  document.getElementById("loc-room").textContent = s.currentSpotArea || "--";
  document.getElementById("loc-pos").textContent = s.robotPos
    ? `x: ${s.robotPos.x}, y: ${s.robotPos.y}`
    : "--";
  document.getElementById("loc-dock").textContent = s.chargePos
    ? `x: ${s.chargePos.x}, y: ${s.chargePos.y}`
    : "--";

  // Consumables
  const c = s.consumables || {};
  document.getElementById("c-main").textContent = fmtLife(c.mainBrush);
  document.getElementById("c-side").textContent = fmtLife(c.sideBrush);
  document.getElementById("c-filter").textContent = fmtLife(c.filter);

  // Device name
  if (s.deviceName) document.getElementById("device-name").textContent = s.deviceName;
}

function fmtLife(v) {
  if (v == null) return "--";
  return Math.round(v) + "%";
}

// ── Toast ──
function toast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.borderColor = isError ? "var(--red)" : "var(--accent)";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── Control mode toggle ──
let controlMode = "joystick";
function toggleControlMode() {
  const btn = document.getElementById("ctrl-toggle");
  if (controlMode === "joystick") {
    controlMode = "buttons";
    document.getElementById("joystick-container").style.display = "none";
    document.getElementById("dpad-container").style.display = "";
    btn.textContent = "Switch to Joystick";
  } else {
    controlMode = "joystick";
    document.getElementById("joystick-container").style.display = "";
    document.getElementById("dpad-container").style.display = "none";
    btn.textContent = "Switch to Buttons";
  }
}

// ── Joystick ──
(function initJoystick() {
  const area = document.getElementById("joystick");
  const knob = document.getElementById("joystick-knob");
  if (!area || !knob) return;

  let active = false;
  let lastDir = null;
  let moveInterval = null;
  const deadzone = 0.25;

  function getDir(dx, dy, dist) {
    if (dist < deadzone) return null;
    const angle = Math.atan2(-dy, dx) * (180 / Math.PI);
    if (angle >= -45 && angle < 45) return "right";
    if (angle >= 45 && angle < 135) return "forward";
    if (angle >= -135 && angle < -45) return "backward";
    return "left";
  }

  function handleMove(clientX, clientY) {
    const rect = area.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const radius = rect.width / 2;
    let dx = (clientX - cx) / radius;
    let dy = (clientY - cy) / radius;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 1) { dx /= dist; dy /= dist; }

    // Move knob visually
    const px = dx * (radius - 36);
    const py = dy * (radius - 36);
    knob.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;

    const dir = getDir(dx, dy, dist);
    if (dir !== lastDir) {
      lastDir = dir;
      clearInterval(moveInterval);
      if (dir) {
        move(dir);
        moveInterval = setInterval(() => move(dir), 500);
      }
    }
  }

  function resetKnob() {
    active = false;
    lastDir = null;
    clearInterval(moveInterval);
    knob.style.transform = "translate(-50%, -50%)";
  }

  area.addEventListener("pointerdown", (e) => {
    active = true;
    area.setPointerCapture(e.pointerId);
    handleMove(e.clientX, e.clientY);
  });
  area.addEventListener("pointermove", (e) => {
    if (!active) return;
    handleMove(e.clientX, e.clientY);
  });
  area.addEventListener("pointerup", resetKnob);
  area.addEventListener("pointercancel", resetKnob);
})();

// ── Fullscreen Map ──
let fsMapInterval = null;

function openMapFullscreen() {
  const fs = document.getElementById("map-fullscreen");
  fs.classList.add("active");
  // Copy current map image
  const src = document.getElementById("map-img").src;
  if (src) document.getElementById("fs-map-img").src = src;
  document.getElementById("fs-room").textContent = document.getElementById("map-room").textContent;
  // Poll map faster while fullscreen
  fsMapInterval = setInterval(async () => {
    try {
      const res = await fetch(API + "/api/map", { headers: authHeaders() });
      if (!res.ok) return;
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const img = document.getElementById("fs-map-img");
      const old = img.src;
      img.src = url;
      if (old && old.startsWith("blob:")) URL.revokeObjectURL(old);
    } catch {}
  }, 5000);
  initFsJoystick();
}

function closeMapFullscreen() {
  document.getElementById("map-fullscreen").classList.remove("active");
  clearInterval(fsMapInterval);
}

function initFsJoystick() {
  const area = document.getElementById("fs-joystick");
  const knob = document.getElementById("fs-joystick-knob");
  if (area._init) return;
  area._init = true;

  let active = false;
  let lastDir = null;
  let moveInterval = null;
  const deadzone = 0.25;

  function getDir(dx, dy, dist) {
    if (dist < deadzone) return null;
    const angle = Math.atan2(-dy, dx) * (180 / Math.PI);
    if (angle >= -45 && angle < 45) return "right";
    if (angle >= 45 && angle < 135) return "forward";
    if (angle >= -135 && angle < -45) return "backward";
    return "left";
  }

  function handleMove(clientX, clientY) {
    const rect = area.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const radius = rect.width / 2;
    let dx = (clientX - cx) / radius;
    let dy = (clientY - cy) / radius;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 1) { dx /= dist; dy /= dist; }
    const px = dx * (radius - 25);
    const py = dy * (radius - 25);
    knob.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
    const dir = getDir(dx, dy, dist);
    if (dir !== lastDir) {
      lastDir = dir;
      clearInterval(moveInterval);
      if (dir) {
        move(dir);
        moveInterval = setInterval(() => move(dir), 500);
      }
    }
  }

  function resetKnob() {
    active = false;
    lastDir = null;
    clearInterval(moveInterval);
    knob.style.transform = "translate(-50%, -50%)";
  }

  area.addEventListener("pointerdown", (e) => {
    active = true;
    area.setPointerCapture(e.pointerId);
    handleMove(e.clientX, e.clientY);
  });
  area.addEventListener("pointermove", (e) => {
    if (!active) return;
    handleMove(e.clientX, e.clientY);
  });
  area.addEventListener("pointerup", resetKnob);
  area.addEventListener("pointercancel", resetKnob);
}

// Enter key on login form
document.getElementById("email").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doLogin();
});
document.getElementById("password").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doLogin();
});
